manifestVersion: 1
id: bitaxe-monitor
name: Bitaxe Monitor
tagline: Real-time dashboard for your Bitaxe miner
icon: https://raw.githubusercontent.com/YOUR_USERNAME/bitaxe-monitor-umbrel/master/bitaxe-monitor/umbrel-app-icon.png
category: bitcoin
version: "1.0.0"
port: 8855
description: >-
  A real-time monitoring dashboard for Bitaxe open-source Bitcoin miners.
  Tracks hashrate, chip temperature, power efficiency, share stats (accepted /
  rejected / stale), and pool latency — all from your Umbrel node.

  Configure your Bitaxe's local IP in the app and it will poll the Bitaxe
  REST API every 10 seconds, displaying live data in a dark mining-themed UI.

  Works with any Bitaxe running the standard AxeOS firmware.
